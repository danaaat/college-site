[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/umos"
  to = "/index.html"
  status = 302

[[redirects]]
  from = "/umos.html"
  to = "/index.html"
  status = 302
